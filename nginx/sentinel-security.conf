# ============================================
# Sentinel — Nginx Security (IP Bloklash)
# Joylashuv: /etc/nginx/sentinel-security.conf
# Ishlatish: nginx.conf ning http {} blokiga include qiling
#
#   http {
#       include /etc/nginx/sentinel-security.conf;
#       ...
#   }
#
# sentinel-deny.map faylini Fail2ban boshqaradi.
# Qo'lda o'zgartirmang.
# ============================================

# Bloklangan IP'lar map'i
# sentinel-deny.map formati:
#   1.2.3.4 1;
#   5.6.7.8 1;
map $remote_addr $sentinel_blocked {
    default 0;
    include /etc/nginx/sentinel-deny.map;
}

# Har bir server {} blokiga qo'shing:
#
#   server {
#       # Sentinel IP bloklash
#       if ($sentinel_blocked) {
#           return 403;
#       }
#       ...
#   }
