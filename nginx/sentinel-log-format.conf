# ============================================
# Sentinel — Nginx Log Format
# Joylashuv: /etc/nginx/sentinel-log-format.conf
# Ishlatish: nginx.conf ning http {} blokiga include qiling
#
#   http {
#       include /etc/nginx/sentinel-log-format.conf;
#       ...
#   }
#
# Keyin har bir server {} blokida:
#
#   access_log /var/log/nginx/example.com_access.log sentinel;
#
# ============================================

log_format sentinel '[$time_local] $status $request_method '
                    '"$request_uri" '
                    '[Client $remote_addr] '
                    '"$http_user_agent"';
