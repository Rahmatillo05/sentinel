# ============================================
# Sentinel — Nginx Real IP (Proxy ortida ishlash uchun)
# Joylashuv: /etc/nginx/sentinel-realip.conf
# Ishlatish: FAQAT HAProxy/LB ortida bo'lsa kerak
#
#   http {
#       include /etc/nginx/sentinel-realip.conf;
#       ...
#   }
#
# Bu fayl X-Forwarded-For headerdan haqiqiy IP'ni oladi.
# $remote_addr haqiqiy foydalanuvchi IP'ga o'zgaradi.
# ============================================

# Proxy IP/subnet — install paytida avtomatik yoziladi
# Bir nechta proxy bo'lsa, har biri uchun alohida qator qo'shing
# set_real_ip_from 10.0.0.0/8;
# set_real_ip_from 192.168.0.0/16;

# X-Forwarded-For headerdan IP olish
real_ip_header X-Forwarded-For;

# Agar bir nechta proxy zanjiri bo'lsa (HAProxy → Nginx → Nginx)
# eng oxirgi ishonchli bo'lmagan IP'ni oladi
real_ip_recursive on;
