# ============================================
# Sentinel Filter: Botnet
# Zararli user-agentlar va hujum toollari
# Joylashuv: /etc/fail2ban/filter.d/sentinel-botnet.conf
# ============================================

[Definition]

# --- Hujum toollari ---
# Bitta urinish yetarli — bu toollar faqat hujum uchun ishlatiladi
failregex = ^\[.*\]\s+\S+\s+\S+\s+".*"\s+\[Client <HOST>\]\s+"(nikto|Nikto|sqlmap|SQLmap|nmap|Nmap|masscan|ZmEu|DirBuster|dirbuster|gobuster|wpscan|WPScan|acunetix|Acunetix|nessus|Nessus|OpenVAS|w3af|hydra|Hydra|Havij|commix|Commix|jbrofuzz|Arachni|Metasploit|Burp|burp)"

# --- Avtomatlashtirilgan scanner/crawler ---
            ^\[.*\]\s+\S+\s+\S+\s+".*"\s+\[Client <HOST>\]\s+"(python-requests|python-httpx|Python-urllib|Go-http-client|Java/|libwww-perl|lwp-trivial|Wget/|curl/|Scrapy|PycURL|PHPCrawl|Mechanize)"

# --- Zararli/shubhali botlar ---
            ^\[.*\]\s+\S+\s+\S+\s+".*"\s+\[Client <HOST>\]\s+"(MJ12bot|AhrefsBot|SemrushBot|DotBot|MegaIndex|BLEXBot|Sogou|MauiBot|PetalBot|SeekportBot)"

# --- Bo'sh User-Agent (hech qanday UA ko'rsatmagan) ---
# Faqat 4xx status bilan birga (health check toollar bo'sh UA yuborishi mumkin)
            ^\[.*\]\s+(400|403|404|405)\s+\S+\s+".*"\s+\[Client <HOST>\]\s+"-"$

# --- SEO botlar va monitoring xizmatlarini O'TKAZISH ---
ignoreregex = .*"(Googlebot|Googlebot-Image|Googlebot-News|Googlebot-Video|Storebot-Google|Google-InspectionTool|GoogleOther|AdsBot-Google|Mediapartners-Google).*"
              .*"(bingbot|msnbot|BingPreview|MicrosoftPreview).*"
              .*"(YandexBot|YandexImages|YandexMetrika|YandexDirect|YandexMedia).*"
              .*"(DuckDuckBot|Baiduspider|Applebot).*"
              .*"(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Pinterest|WhatsApp|TelegramBot).*"
              .*"(UptimeRobot|Pingdom|StatusCake|Site24x7|Datadog|NewRelicPinger).*"
