# ============================================
# Sentinel Filter: Scanner
# Sezgir fayllar, admin panellar, CMS skanerlash, infra expose
# Joylashuv: /etc/fail2ban/filter.d/sentinel-scanner.conf
# ============================================

[Definition]

# --- Sentinel log formati ---
# [24/Mar/2026:10:15:30 +0500] 404 GET "/.git/config" [Client 5.6.7.8] "Mozilla/5.0..."
#
# Regex tushuntirish:
#   ^\[.*\]           = [vaqt]
#   \s+\S+            = status kod
#   \s+\S+            = HTTP metod
#   \s+"<URL>"        = so'rov URL (shu yerda pattern qidiriladi)
#   \s+\[Client <HOST>\] = IP manzil

# --- Sezgir/maxfiy fayllar ---
failregex = ^\[.*\]\s+\S+\s+\S+\s+".*(/\.env|/\.git|/\.svn|/\.aws|/\.ssh|/\.htaccess|/\.htpasswd|/\.dockerenv|/\.bash_history|/\.config|/\.npm|/\.kube).*"\s+\[Client <HOST>\]

# --- CMS skanerlash (WordPress, Joomla, Drupal) ---
            ^\[.*\]\s+\S+\s+\S+\s+".*(/wp-login|/wp-admin|/wp-config|/wp-includes|/wp-content/uploads|/xmlrpc\.php|/wp-cron\.php).*"\s+\[Client <HOST>\]
            ^\[.*\]\s+\S+\s+\S+\s+".*(/administrator/|/joomla/|/drupal/|/sites/default/files).*"\s+\[Client <HOST>\]

# --- Admin panellar va DB toollar ---
            ^\[.*\]\s+\S+\s+\S+\s+".*(phpmyadmin|/pma|phpMyAdmin|/myadmin|/mysql|/adminer|/dbadmin|/sqladmin).*"\s+\[Client <HOST>\]
            ^\[.*\]\s+\S+\s+\S+\s+".*(/manager/html|/admin-console|/web-console).*"\s+\[Client <HOST>\]

# --- Framework specific ---
            ^\[.*\]\s+\S+\s+\S+\s+".*(/\_ignition/execute-solution|/telescope|/horizon|/nova-api|/vendor/phpunit).*"\s+\[Client <HOST>\]

# --- Backup fayllar ---
            ^\[.*\]\s+\S+\s+\S+\s+".*\.(bak|sql|tar\.gz|zip|rar|7z|old|swp|save|orig|dump|db)[\s\?\"].*\[Client <HOST>\]

# --- Infra/Platform expose ---
            ^\[.*\]\s+\S+\s+\S+\s+".*(/actuator|/jolokia|/console|/solr/|/elasticsearch|/_cat/|/_search|/v2/_catalog|/api/v1/namespaces).*"\s+\[Client <HOST>\]

# --- IoT/Router/Kamera exploit ---
            ^\[.*\]\s+\S+\s+\S+\s+".*(/cgi-bin/|/SDK/webLanguage|/cstecgi\.cgi|/HNAP1|/goform/|/currentsetting\.htm).*"\s+\[Client <HOST>\]

# --- VPN/Firewall probe ---
            ^\[.*\]\s+\S+\s+\S+\s+".*(/remote/logincheck|/vpn/|/sslvpn|/dana-na/|/global-protect|/ssl-vpn).*"\s+\[Client <HOST>\]

# --- DNS resolver sinovi ---
            ^\[.*\]\s+\S+\s+\S+\s+".*(/dns-query).*"\s+\[Client <HOST>\]

# --- ignoreregex bu yerda YO'Q ---
# Googlebot hech qachon /.env yoki /wp-admin so'ramaydi.
# Agar kimdir UA'ni "Googlebot" qilsa — bu hujumchi, o'tkazmaslik kerak.
# Haqiqiy botlar ignoreip (IP whitelist) orqali himoyalangan.
ignoreregex =
