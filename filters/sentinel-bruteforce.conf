# ============================================
# Sentinel Filter: Brute Force
# Login sahifalariga brute force hujum aniqlash
# Joylashuv: /etc/fail2ban/filter.d/sentinel-bruteforce.conf
# ============================================

[Definition]

# --- Login endpointlariga POST so'rovlar ---
# 5 daqiqada 10+ ta POST /login = brute force
failregex = ^\[.*\]\s+\S+\s+POST\s+"(/login|/signin|/auth|/api/auth|/api/login|/api/v1/auth|/api/v1/login|/oauth/token|/admin/login|/user/login|/account/login|/wp-login\.php|/administrator/index\.php).*"\s+\[Client <HOST>\]

# --- 401 Unauthorized flood ---
            ^\[.*\]\s+401\s+\S+\s+".*"\s+\[Client <HOST>\]

# --- SEO botlar va monitoring xizmatlarini O'TKAZISH ---
ignoreregex = .*"(Googlebot|Googlebot-Image|Googlebot-News|Googlebot-Video|Storebot-Google|Google-InspectionTool|GoogleOther|AdsBot-Google|Mediapartners-Google).*"
              .*"(bingbot|msnbot|BingPreview|MicrosoftPreview).*"
              .*"(YandexBot|YandexImages|YandexMetrika|YandexDirect|YandexMedia).*"
              .*"(DuckDuckBot|Baiduspider|Applebot).*"
              .*"(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Pinterest|WhatsApp|TelegramBot).*"
              .*"(UptimeRobot|Pingdom|StatusCake|Site24x7|Datadog|NewRelicPinger).*"
