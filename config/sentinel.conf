# ============================================
# Sentinel — Markaziy Konfiguratsiya
# Joylashuv: /etc/sentinel/sentinel.conf
# Huquqlar: chmod 600 (faqat root o'qiy oladi)
# ============================================

# --- Telegram sozlamalari ---
BOT_TOKEN=""
CHAT_ID=""

# --- Sentinel log fayli ---
LOG_FILE="/var/log/sentinel/sentinel.log"

# --- Nginx deny map fayli ---
DENY_MAP="/etc/nginx/sentinel-deny.map"

# --- Arxitektura ---
# "direct" = Nginx to'g'ridan-to'g'ri internet bilan ishlaydi
# "proxy"  = HAProxy/LB ortida
ARCHITECTURE="direct"

# --- Proxy subnet (faqat ARCHITECTURE=proxy bo'lsa) ---
# HAProxy yoki Load Balancer IP/subnet
PROXY_SUBNET=""

# --- Firewall backend (avtomatik aniqlanadi, qo'lda o'zgartirish mumkin) ---
# "nftables" | "firewalld" | "iptables" | "none"
FIREWALL_BACKEND=""

# --- Whitelist yangilash ---
# Google/Bing/Yandex IP diapazonlarini avtomatik yangilash
WHITELIST_AUTO_UPDATE="yes"
WHITELIST_CRON_SCHEDULE="0 3 * * 1"

# --- Kunlik hisobot ---
DAILY_REPORT_ENABLED="yes"
DAILY_REPORT_CRON="0 8 * * *"

# --- Health check ---
HEALTH_CHECK_ENABLED="yes"
HEALTH_CHECK_CRON="*/30 * * * *"
