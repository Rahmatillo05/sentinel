# ============================================
# Sentinel Action: Telegram Notification
# Ban/Unban xabarlarini Telegram'ga yuborish
# Joylashuv: /etc/fail2ban/action.d/sentinel-telegram.conf
# ============================================

[Definition]

actionstart =

actionstop =

actioncheck =

# Ban bo'lganda xabar yuborish
actionban = /usr/local/bin/sentinel-notify.sh ban "<name>" "<ip>" "<failures>" "<time>"

# Unban bo'lganda xabar yuborish
actionunban = /usr/local/bin/sentinel-notify.sh unban "<name>" "<ip>"

[Init]

name = default
