# ============================================
# Sentinel Action: Nginx Block Map
# IP'ni Nginx deny map'ga qo'shish/o'chirish
# Joylashuv: /etc/fail2ban/action.d/sentinel-nginx-block.conf
# ============================================
# Ishlash tartibi:
#   Ban  → IP sentinel-deny.map ga yoziladi → reload signal
#   Unban → IP sentinel-deny.map dan o'chiriladi → reload signal
#
# MUHIM: Har safar to'g'ridan-to'g'ri reload qilinmaydi.
# Flag fayl yaratiladi, alohida timer 10 sekundda bir reload qiladi.
# Bu production tizimdagi websocket/long-polling ulanishlarni himoya qiladi.
# ============================================

[Definition]

# Sentinel boshlanganida reload timer'ni ishga tushirish
actionstart = touch <deny_map>
              /usr/local/bin/sentinel-reload-timer.sh start &

# Sentinel to'xtaganda timer'ni to'xtatish
actionstop = /usr/local/bin/sentinel-reload-timer.sh stop

actioncheck =

# IP'ni deny map'ga qo'shish + reload signal
# flock — parallel ban/unban da race condition oldini oladi
# printf — shell interpretation yo'q, injection xavfi yo'q
actionban = flock -w 5 <deny_map> -c "printf '<ip>' | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' && ! grep -qxF '<ip> 1;' <deny_map> 2>/dev/null && printf '<ip> 1;\n' >> <deny_map>"
            touch /var/log/sentinel/sentinel-needs-reload

# IP'ni deny map'dan o'chirish + reload signal
actionunban = flock -w 5 <deny_map> -c "grep -vxF '<ip> 1;' <deny_map> > <deny_map>.tmp 2>/dev/null && mv <deny_map>.tmp <deny_map> || true"
              touch /var/log/sentinel/sentinel-needs-reload

[Init]

deny_map = /etc/nginx/sentinel-deny.map
