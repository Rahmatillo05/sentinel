# ============================================
# Sentinel — Jail Konfiguratsiya (shablon)
# Joylashuv: /etc/fail2ban/jail.d/sentinel-jails.conf
# ============================================
# Bu shablon fayl. Haqiqiy config install.sh tomonidan yaratiladi.
# ignoreip va action qiymatlari install paytida avtomatik yoziladi.
# ============================================

[sentinel-scanner]
enabled  = true
port     = http,https
filter   = sentinel-scanner
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/*_sentinel.log
           /var/log/nginx/access.log
maxretry = 3
findtime = 600
bantime  = 86400
# ignoreip va action — install.sh tomonidan yoziladi

[sentinel-exploit]
enabled  = true
port     = http,https
filter   = sentinel-exploit
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/*_sentinel.log
           /var/log/nginx/access.log
maxretry = 1
findtime = 600
bantime  = 604800

[sentinel-botnet]
enabled  = true
port     = http,https
filter   = sentinel-botnet
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/*_sentinel.log
           /var/log/nginx/access.log
maxretry = 1
findtime = 600
bantime  = 604800

[sentinel-ratelimit]
enabled  = true
port     = http,https
filter   = sentinel-ratelimit
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/*_sentinel.log
           /var/log/nginx/access.log
maxretry = 100
findtime = 60
bantime  = 3600

[sentinel-bruteforce]
enabled  = true
port     = http,https
filter   = sentinel-bruteforce
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/*_sentinel.log
           /var/log/nginx/access.log
maxretry = 15
findtime = 300
bantime  = 3600

[sentinel-recidive]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
maxretry = 3
findtime = 86400
bantime  = 604800
bantime.increment = true
bantime.factor    = 2
bantime.maxtime   = 2592000

[sshd]
enabled  = true
port     = ssh
filter   = sshd
maxretry = 5
findtime = 600
bantime  = 86400
