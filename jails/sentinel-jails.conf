# ============================================
# Sentinel — Jail Konfiguratsiya
# Joylashuv: /etc/fail2ban/jail.d/sentinel-jails.conf
# ============================================
# banaction va ignoreip install.sh tomonidan avtomatik yoziladi.
# Qo'lda o'zgartirmang — install.sh qayta ishga tushiring.
# ============================================

[DEFAULT]

# --- Whitelist (install paytida avtomatik to'ldiriladi) ---
ignoreip = 127.0.0.1/8
           ::1
           # SENTINEL_WHITELIST_PLACEHOLDER

# ============================================
# 1. Scanner — sezgir fayllar, admin panel, CMS
# ============================================
[sentinel-scanner]
enabled  = true
port     = http,https
filter   = sentinel-scanner
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/access.log
maxretry = 3
findtime = 600
bantime  = 86400
# SENTINEL_ACTION_PLACEHOLDER

# ============================================
# 2. Exploit — SQLi, XSS, RCE, SSRF, Log4Shell
# ============================================
[sentinel-exploit]
enabled  = true
port     = http,https
filter   = sentinel-exploit
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/access.log
maxretry = 1
findtime = 600
bantime  = 604800
# SENTINEL_ACTION_PLACEHOLDER

# ============================================
# 3. Botnet — zararli user-agentlar
# ============================================
[sentinel-botnet]
enabled  = true
port     = http,https
filter   = sentinel-botnet
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/access.log
maxretry = 1
findtime = 600
bantime  = 604800
# SENTINEL_ACTION_PLACEHOLDER

# ============================================
# 4. Rate Limit — 4xx flood
# ============================================
[sentinel-ratelimit]
enabled  = true
port     = http,https
filter   = sentinel-ratelimit
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/access.log
maxretry = 100
findtime = 60
bantime  = 3600
# SENTINEL_ACTION_PLACEHOLDER

# ============================================
# 5. Brute Force — login hujum
# ============================================
[sentinel-bruteforce]
enabled  = true
port     = http,https
filter   = sentinel-bruteforce
logpath  = /var/log/nginx/*_access.log
           /var/log/nginx/access.log
maxretry = 15
findtime = 300
bantime  = 3600
# SENTINEL_ACTION_PLACEHOLDER

# ============================================
# 6. Recidive — qayta offenderlar (progressiv ban)
# ============================================
[sentinel-recidive]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
maxretry = 3
findtime = 86400
bantime  = 604800
bantime.increment = true
bantime.factor    = 2
bantime.maxtime   = 2592000
# SENTINEL_RECIDIVE_ACTION_PLACEHOLDER

# ============================================
# 7. SSH (standart Fail2ban sshd jail)
# ============================================
[sshd]
enabled  = true
port     = ssh
filter   = sshd
maxretry = 5
findtime = 600
bantime  = 86400
# SENTINEL_SSH_ACTION_PLACEHOLDER
